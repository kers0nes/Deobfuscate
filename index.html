<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua Deobfuscator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e1e2e;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #181825;
            padding: 15px 20px;
            border-bottom: 1px solid #313244;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            color: #cba6f7;
            font-size: 1.5rem;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button {
            background: #313244;
            color: #cdd6f4;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }

        button:hover {
            background: #45475a;
        }

        .primary {
            background: #89b4fa;
            color: #1e1e2e;
        }

        .primary:hover {
            background: #b4befe;
        }

        .danger {
            background: #f38ba8;
            color: #1e1e2e;
        }

        .container {
            display: flex;
            flex: 1;
            gap: 1px;
            background: #313244;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e2e;
        }

        .panel-header {
            background: #181825;
            padding: 10px;
            font-weight: bold;
            color: #a6e3a1;
            border-bottom: 1px solid #313244;
        }

        textarea {
            flex: 1;
            background: #11111b;
            color: #cdd6f4;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }

        .output {
            flex: 1;
            background: #11111b;
            color: #cdd6f4;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .log {
            background: #181825;
            padding: 10px;
            font-size: 12px;
            color: #a6e3a1;
            border-top: 1px solid #313244;
            max-height: 100px;
            overflow: auto;
        }

        .status {
            padding: 5px 10px;
            background: #313244;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔓 Lua Deobfuscator</h1>
        <div class="buttons">
            <div class="status" id="status">Ready</div>
            <button id="deobfBtn" class="primary">▶ Deobfuscate</button>
            <button id="simulateBtn">⚙ Simulate Loadstring</button>
            <button id="clearBtn" class="danger">🗑 Clear</button>
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <div class="panel-header">📝 Input (Obfuscated Lua)</div>
            <textarea id="input" placeholder="Paste obfuscated Lua/Roblox script here..."></textarea>
        </div>
        <div class="panel">
            <div class="panel-header">✨ Output (Deobfuscated)</div>
            <div id="output" class="output">-- Deobfuscated code will appear here --</div>
        </div>
    </div>
    <div class="log" id="log">[System] Ready. Paste your Lua code and click Deobfuscate.</div>

    <script>
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');

        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML = `[${time}] ${msg}<br>${logEl.innerHTML}`;
            if (logEl.children.length > 20) {
                const lines = logEl.innerHTML.split('<br>');
                lines.pop();
                logEl.innerHTML = lines.join('<br>');
            }
        }

        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.style.background = isError ? '#f38ba8' : '#313244';
            statusEl.style.color = isError ? '#1e1e2e' : '#cdd6f4';
            setTimeout(() => {
                if (statusEl.textContent === text) {
                    statusEl.style.background = '#313244';
                    statusEl.style.color = '#cdd6f4';
                }
            }, 2000);
        }

        // Simulate loadstring - extracts strings from loadstring/load calls
        function simulateLoadstring(code) {
            let result = code;
            let changes = 0;
            let maxPasses = 10;
            
            for (let pass = 0; pass < maxPasses; pass++) {
                let newResult = result;
                
                // Match loadstring("...") or load('...')
                const patterns = [
                    /loadstring\s*\(\s*(["'])((?:(?=(\\?))\3.)*?)\1\s*\)/gs,
                    /load\s*\(\s*(["'])((?:(?=(\\?))\3.)*?)\1\s*\)/gs
                ];
                
                for (const pattern of patterns) {
                    newResult = newResult.replace(pattern, (match, quote, content) => {
                        // Unescape the string
                        let unescaped = content.replace(/\\n/g, '\n').replace(/\\t/g, '\t').replace(/\\"/g, '"').replace(/\\'/g, "'");
                        addLog(`📦 Extracted loadstring: ${unescaped.substring(0, 60)}${unescaped.length > 60 ? '...' : ''}`);
                        changes++;
                        return `--[LOADSTRING RESULT]--\n${unescaped}\n--[/LOADSTRING]--`;
                    });
                }
                
                if (newResult === result) break;
                result = newResult;
            }
            
            return { result, changes };
        }

        // Decode common obfuscation patterns
        function decodeCommonObfuscation(code) {
            let decoded = code;
            
            // Decode \x hex sequences
            decoded = decoded.replace(/\\x([0-9a-fA-F]{2})/g, (match, hex) => {
                return String.fromCharCode(parseInt(hex, 16));
            });
            
            // Decode string.char() calls
            decoded = decoded.replace(/string\.char\(\s*([\d,\s]+)\s*\)/g, (match, nums) => {
                const codes = nums.split(',').map(n => parseInt(n.trim(), 10));
                if (codes.some(isNaN)) return match;
                return '"' + String.fromCharCode(...codes) + '"';
            });
            
            // Decode simple concatenation patterns like "a".."b"
            decoded = decoded.replace(/(["'])(.*?)\1\s*\.\.\s*(["'])(.*?)\3/g, (match, q1, s1, q2, s2) => {
                return `"${s1}${s2}"`;
            });
            
            return decoded;
        }

        // Main deobfuscation function
        function deobfuscate(code) {
            if (!code.trim()) {
                return { success: false, error: "No code provided" };
            }
            
            let working = code;
            const logs = [];
            
            // Pass 1: Simulate loadstring
            const simResult = simulateLoadstring(working);
            working = simResult.result;
            logs.push(`Extracted ${simResult.changes} loadstring calls`);
            
            // Pass 2: Decode hex and string.char
            working = decodeCommonObfuscation(working);
            logs.push("Decoded hex sequences and string.char() calls");
            
            // Pass 3: Clean up comments and formatting
            working = working.replace(/--\[LOADSTRING RESULT\]--/g, '--[DECODED]');
            working = working.replace(/--\[\/LOADSTRING\]--/g, '');
            
            // Remove multiple blank lines
            working = working.replace(/\n\s*\n\s*\n/g, '\n\n');
            
            return { success: true, code: working, logs };
        }

        function handleDeobfuscate() {
            const input = inputEl.value;
            if (!input.trim()) {
                setStatus("No input", true);
                addLog("❌ Error: Paste some Lua code first");
                return;
            }
            
            setStatus("Deobfuscating...");
            addLog("🔧 Starting deobfuscation...");
            
            try {
                const result = deobfuscate(input);
                
                if (result.success) {
                    outputEl.textContent = result.code;
                    result.logs.forEach(log => addLog(`✓ ${log}`));
                    addLog("✅ Deobfuscation complete!");
                    setStatus("Done");
                } else {
                    outputEl.textContent = `-- ERROR --\n${result.error}`;
                    setStatus("Failed", true);
                    addLog(`❌ ${result.error}`);
                }
            } catch (err) {
                outputEl.textContent = `-- ERROR --\n${err.message}`;
                setStatus("Error", true);
                addLog(`❌ Unexpected error: ${err.message}`);
            }
        }

        function handleSimulateOnly() {
            const input = inputEl.value;
            if (!input.trim()) {
                setStatus("No input", true);
                addLog("❌ Error: Paste some Lua code first");
                return;
            }
            
            setStatus("Simulating...");
            addLog("⚙ Running loadstring simulation only...");
            
            try {
                const result = simulateLoadstring(input);
                outputEl.textContent = result.result;
                addLog(`📦 Extracted ${result.changes} loadstring calls`);
                setStatus("Simulation done");
            } catch (err) {
                outputEl.textContent = `-- ERROR --\n${err.message}`;
                setStatus("Error", true);
                addLog(`❌ Simulation error: ${err.message}`);
            }
        }

        function handleClear() {
            inputEl.value = '';
            outputEl.textContent = '-- Deobfuscated code will appear here --';
            addLog("🧹 Cleared input and output");
            setStatus("Cleared");
        }

        // Example script to get users started
        function loadExample() {
            const example = `--[[ Obfuscated Lua Example with loadstring ]]--

local _0x3f4a = loadstring(string.char(112,114,105,110,116,40,34,72,101,108,108,111,32,87,111,114,108,100,34,41))
_0x3f4a()

-- Nested loadstring obfuscation
local secret = loadstring("loadstring('print(\\\\\"Roblox script decoded\\\\\")')")()
secret()

-- Normal code that should remain
local Players = game:GetService("Players")
Players.PlayerAdded:Connect(function(player)
    print(player.Name .. " joined the game!")
end)`;

            inputEl.value = example;
            addLog("📝 Example script loaded. Click Deobfuscate to see it work.");
            setStatus("Example loaded");
        }

        // Bind events
        document.getElementById('deobfBtn').addEventListener('click', handleDeobfuscate);
        document.getElementById('simulateBtn').addEventListener('click', handleSimulateOnly);
        document.getElementById('clearBtn').addEventListener('click', handleClear);
        
        // Load example on page load
        setTimeout(loadExample, 100);
    </script>
</body>
</html>
